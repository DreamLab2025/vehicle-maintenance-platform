# docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d
# docker-compose ... up -d --scale identity-service=2 --scale vehicle-service=2 ...
#
# Tài nguyên dưới đây bám theo single-node ~4 GiB RAM / 2 vCPU (vd. EC2 t3.medium).
# Máy lớn hơn: tăng mem_limit/cpus và postgres max_connections + pool trong connection string.

x-common-environment: &common-environment
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}
  ConnectionStrings__seq: http://seq:5341
  JwtBearer__SecretKey: ${JWT_BEARER_SECRET_KEY}
  JwtBearer__Issuer: ${JWT_BEARER_ISSUER}
  JwtBearer__Audience: ${JWT_BEARER_AUDIENCE}
  JwtBearer__ExpirationMinutes: ${JWT_BEARER_EXPIRATION_MINUTES:-60}
  JwtBearer__RefreshTokenExpirationDays: ${JWT_BEARER_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
  JwtBearer__ValidateIssuer: true
  JwtBearer__ValidateAudience: true
  JwtBearer__ValidateLifetime: true
  JwtBearer__ValidateIssuerSigningKey: true
  JwtBearer__ClockSkewSeconds: 0
  FrontendUrl: ${FRONTEND_URL}

x-identity-service-environment: &identity-service-environment
  ConnectionStrings__identity-db: Host=postgres;Port=5432;Database=${IDENTITY_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=20;Minimum Pool Size=1;Connection Idle Lifetime=300
  ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672

x-vehicle-service-environment: &vehicle-service-environment
  ConnectionStrings__vehicle-db: Host=postgres;Port=5432;Database=${VEHICLE_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=20;Minimum Pool Size=1;Connection Idle Lifetime=300
  ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
  Identity__BaseUrl: ${IDENTITY_SERVICE_BASE_URL:-http://identity-service:8080}

x-media-service-environment: &media-service-environment
  ConnectionStrings__media-db: Host=postgres;Port=5432;Database=${MEDIA_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=12;Minimum Pool Size=1;Connection Idle Lifetime=300
  ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
  S3Settings__BucketName: ${MEDIA_S3_BUCKET_NAME}
  S3Settings__Region: ${MEDIA_S3_REGION:-ap-southeast-1}
  S3Settings__AccessKey: ${MEDIA_S3_ACCESS_KEY}
  S3Settings__SecretKey: ${MEDIA_S3_SECRET_KEY}
  S3Settings__CloudFrontUrl: ${MEDIA_S3_CLOUDFRONT_URL:-}

x-notification-service-environment: &notification-service-environment
  ConnectionStrings__notification-db: Host=postgres;Port=5432;Database=${NOTIFICATION_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=12;Minimum Pool Size=1;Connection Idle Lifetime=300
  ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
  Email__EnableRealSend: ${NOTIFICATION_EMAIL_ENABLE_REAL_SEND:-true}
  Email__Resend__ApiKey: ${RESEND_API_KEY}
  Email__Resend__FromEmail: ${RESEND_FROM_EMAIL}
  Email__Resend__FromName: ${RESEND_FROM_NAME:-Verendar}
  Email__Resend__ReplyTo: ${RESEND_REPLY_TO:-}
  Email__Resend__Timeout: ${RESEND_TIMEOUT:-30}
  Email__Resend__EnableTracking: ${RESEND_ENABLE_TRACKING:-true}
  Email__Resend__TemplateBasePath: ${RESEND_TEMPLATE_BASE_PATH:-Templates/Email}
  Email__Resend__EnableTemplateCache: ${RESEND_ENABLE_TEMPLATE_CACHE:-true}
  Email__Resend__TemplateCacheExpirationMinutes: ${RESEND_TEMPLATE_CACHE_EXPIRATION_MINUTES:-60}
  Email__Resend__UseDatabaseTemplates: ${RESEND_USE_DATABASE_TEMPLATES:-false}

x-ai-service-environment: &ai-service-environment
  ConnectionStrings__ai-db: Host=postgres;Port=5432;Database=${AI_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=6;Minimum Pool Size=1;Connection Idle Lifetime=300
  ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
  AiProvider: ${AI_PROVIDER:-Gemini}
  Gemini__ApiKey: ${GEMINI_API_KEY}
  Gemini__ApiEndpoint: ${GEMINI_API_ENDPOINT:-https://generativelanguage.googleapis.com/v1beta}
  Gemini__DefaultModel: ${GEMINI_DEFAULT_MODEL:-gemini-2.5-flash-lite}
  Gemini__MaxRetries: ${GEMINI_MAX_RETRIES:-3}
  Gemini__TimeoutSeconds: ${GEMINI_TIMEOUT_SECONDS:-180}
  Gemini__RequestsPerMinute: ${GEMINI_REQUESTS_PER_MINUTE:-60}
  Gemini__RequestsPerDay: ${GEMINI_REQUESTS_PER_DAY:-1500}
  Gemini__MaxConcurrentRequests: ${GEMINI_MAX_CONCURRENT_REQUESTS:-5}
  Gemini__DefaultParameters__MaxTokens: ${GEMINI_DEFAULT_PARAMETERS_MAX_TOKENS:-8192}
  Gemini__DefaultParameters__Temperature: ${GEMINI_DEFAULT_PARAMETERS_TEMPERATURE:-0.7}
  Gemini__DefaultParameters__TopP: ${GEMINI_DEFAULT_PARAMETERS_TOP_P:-0.95}
  Gemini__DefaultParameters__TopK: ${GEMINI_DEFAULT_PARAMETERS_TOP_K:-40}
  Bedrock__Region: ${BEDROCK_REGION:-us-east-1}
  Bedrock__AccessKey: ${BEDROCK_ACCESS_KEY:-}
  Bedrock__SecretKey: ${BEDROCK_SECRET_KEY:-}
  Bedrock__DefaultModel: ${BEDROCK_DEFAULT_MODEL:-anthropic.claude-3-5-sonnet-20240620-v1:0}
  Bedrock__MaxRetries: ${BEDROCK_MAX_RETRIES:-3}
  Bedrock__TimeoutSeconds: ${BEDROCK_TIMEOUT_SECONDS:-60}
  Bedrock__DefaultParameters__MaxTokens: ${BEDROCK_DEFAULT_PARAMETERS_MAX_TOKENS:-8192}
  Bedrock__DefaultParameters__Temperature: ${BEDROCK_DEFAULT_PARAMETERS_TEMPERATURE:-0.7}
  Bedrock__DefaultParameters__TopP: ${BEDROCK_DEFAULT_PARAMETERS_TOP_P:-0.95}
  Bedrock__DefaultParameters__TopK: ${BEDROCK_DEFAULT_PARAMETERS_TOP_K:-40}
  VehicleService__BaseUrl: ${VEHICLE_SERVICE_BASE_URL:-http://vehicle-service:8080}
  MediaService__BaseUrl: ${MEDIA_SERVICE_BASE_URL:-http://media-service:8080}

x-location-service-environment: &location-service-environment
  ConnectionStrings__location-db: Host=postgres;Port=5432;Database=${LOCATION_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=12;Minimum Pool Size=1;Connection Idle Lifetime=300
  ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
  Geocoding__AWS__Enabled: ${LOCATION_AWS_GEOCODING_ENABLED:-true}
  Geocoding__AWS__Region: ${LOCATION_AWS_REGION:-us-east-1}
  Geocoding__AWS__AccessKey: ${LOCATION_AWS_ACCESS_KEY:-}
  Geocoding__AWS__SecretKey: ${LOCATION_AWS_SECRET_KEY:-}

x-garage-service-environment: &garage-service-environment
  ConnectionStrings__garage-db: Host=postgres;Port=5432;Database=${GARAGE_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=20;Minimum Pool Size=1;Connection Idle Lifetime=300
  ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
  Services__Location__BaseUrl: ${LOCATION_SERVICE_BASE_URL:-http://location-service:8080}
  Services__Vehicle__BaseUrl: ${VEHICLE_SERVICE_BASE_URL:-http://vehicle-service:8080}
  Services__Identity__BaseUrl: ${IDENTITY_SERVICE_BASE_URL:-http://identity-service:8080}
  Services__Payment__BaseUrl: ${PAYMENT_SERVICE_BASE_URL:-}

services:
  postgres:
    image: postgres:17-alpine
    container_name: verendar-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-verendar}
    command: ["postgres", "-c", "max_connections=100", "-c", "shared_buffers=128MB", "-c", "effective_cache_size=256MB"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql:ro
    mem_limit: 384m
    cpus: "0.35"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-verendar}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - verendar-network
    restart: unless-stopped

  redis:
    image: redis:7.4.0-alpine
    container_name: verendar-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    mem_limit: 320m
    cpus: "0.15"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - verendar-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.0.2-management-alpine
    container_name: verendar-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_NODENAME: rabbit@rabbitmq
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    mem_limit: 384m
    cpus: "0.25"
    ports:
      - "5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_local_alarms" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - verendar-network
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    container_name: verendar-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_FIRSTRUN_ADMINPASSWORD:?SEQ_FIRSTRUN_ADMINPASSWORD is required}
    ports:
      - "127.0.0.1:5341:5341"   # ingestion (internal only)
      - "127.0.0.1:5340:80"     # UI — access via SSH tunnel: ssh -L 5340:localhost:5340 ec2-user@<ip>
    volumes:
      - seq_data:/data
    mem_limit: 192m
    cpus: 0.3
    networks:
      - verendar-network
    restart: unless-stopped

  location-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-location-service:${IMAGE_TAG:-latest}
    expose:
      - "8080"
    ports:
      - "${LOCATION_SERVICE_PORT:-7006}:8080"
    mem_limit: 288m
    cpus: "0.20"
    environment:
      <<: [ *common-environment, *location-service-environment ]
      DOTNET_RUNNING_IN_CONTAINER: "true"
      DOTNET_GCConserve: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - verendar-network
    restart: unless-stopped

  garage-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-garage-service:${IMAGE_TAG:-latest}
    expose:
      - "8080"
    ports:
      - "${GARAGE_SERVICE_PORT:-7007}:8080"
    mem_limit: 352m
    cpus: "0.35"
    environment:
      <<: [ *common-environment, *garage-service-environment ]
      DOTNET_RUNNING_IN_CONTAINER: "true"
      DOTNET_GCConserve: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      location-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - verendar-network
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: verendar-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./data/gateway/etc/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/gateway/etc/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/gateway/etc/nginx/snippets:/etc/nginx/snippets:ro
    mem_limit: 64m
    cpus: "0.10"
    networks:
      - verendar-network
    restart: unless-stopped
    depends_on:
      identity-service:
        condition: service_healthy
      vehicle-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      location-service:
        condition: service_healthy
      garage-service:
        condition: service_healthy

  identity-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-identity-service:${IMAGE_TAG:-latest}
    expose:
      - "8080"
    ports:
      - "${IDENTITY_SERVICE_PORT:-7001}:8080"
    mem_limit: 384m
    cpus: "0.40"
    environment:
      <<: [ *common-environment, *identity-service-environment ]
      DOTNET_RUNNING_IN_CONTAINER: "true"
      DOTNET_GCConserve: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - verendar-network
    restart: unless-stopped

  vehicle-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-vehicle-service:${IMAGE_TAG:-latest}
    expose:
      - "8080"
    ports:
      - "${VEHICLE_SERVICE_PORT:-7002}:8080"
    mem_limit: 352m
    cpus: "0.40"
    environment:
      <<: [ *common-environment, *vehicle-service-environment ]
      DOTNET_RUNNING_IN_CONTAINER: "true"
      DOTNET_GCConserve: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - verendar-network
    restart: unless-stopped

  media-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-media-service:${IMAGE_TAG:-latest}
    expose:
      - "8080"
    ports:
      - "${MEDIA_SERVICE_PORT:-7003}:8080"
    mem_limit: 224m
    cpus: "0.20"
    environment:
      <<: [ *common-environment, *media-service-environment ]
      DOTNET_RUNNING_IN_CONTAINER: "true"
      DOTNET_GCConserve: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - verendar-network
    restart: unless-stopped

  notification-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-notification-service:${IMAGE_TAG:-latest}
    expose:
      - "8080"
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-7004}:8080"
    mem_limit: 288m
    cpus: "0.20"
    environment:
      <<: [ *common-environment, *notification-service-environment ]
      DOTNET_RUNNING_IN_CONTAINER: "true"
      DOTNET_GCConserve: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - verendar-network
    restart: unless-stopped

  ai-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-ai-service:${IMAGE_TAG:-latest}
    expose:
      - "8080"
    ports:
      - "${AI_SERVICE_PORT:-7005}:8080"
    mem_limit: 288m
    cpus: "0.20"
    environment:
      <<: [ *common-environment, *ai-service-environment ]
      DOTNET_RUNNING_IN_CONTAINER: "true"
      DOTNET_GCConserve: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - verendar-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  seq_data:

networks:
  verendar-network:
    driver: bridge
