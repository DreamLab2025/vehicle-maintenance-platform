# Verendar - Docker Compose Production
# Workflow: build local -> push Docker Hub -> trên server: pull và chạy (không build).
# Cần set DOCKER_IMAGE_PREFIX, IMAGE_TAG và CORS_ALLOWED_ORIGINS trong .env.prod (xem .env.prod.example).
# Chạy từ repo root: docker-compose -f docker/docker-compose.prod.yml --env-file docker/.env.prod up -d
# Hoặc từ docker/:   docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d

x-common-environment: &common-environment
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}
  JwtBearer__SecretKey: ${JWT_BEARER_SECRET_KEY}
  JwtBearer__Issuer: ${JWT_BEARER_ISSUER}
  JwtBearer__Audience: ${JWT_BEARER_AUDIENCE}
  JwtBearer__ExpirationMinutes: ${JWT_BEARER_EXPIRATION_MINUTES:-60}
  JwtBearer__RefreshTokenExpirationDays: ${JWT_BEARER_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
  JwtBearer__ValidateIssuer: true
  JwtBearer__ValidateAudience: true
  JwtBearer__ValidateLifetime: true
  JwtBearer__ValidateIssuerSigningKey: true
  JwtBearer__ClockSkewSeconds: 0
  FrontendUrl: ${FRONTEND_URL}

x-identity-service-environment: &identity-service-environment
  ConnectionStrings__identity-db: Host=postgres;Port=5432;Database=${IDENTITY_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
  ConnectionStrings__redis-cache: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672

x-vehicle-service-environment: &vehicle-service-environment
  ConnectionStrings__vehicle-db: Host=postgres;Port=5432;Database=${VEHICLE_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
  ConnectionStrings__redis-cache: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672

x-media-service-environment: &media-service-environment
  ConnectionStrings__media-db: Host=postgres;Port=5432;Database=${MEDIA_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
  ConnectionStrings__redis-cache: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
  S3Settings__BucketName: ${MEDIA_S3_BUCKET_NAME}
  S3Settings__Region: ${MEDIA_S3_REGION:-ap-southeast-1}
  S3Settings__AccessKey: ${MEDIA_S3_ACCESS_KEY}
  S3Settings__SecretKey: ${MEDIA_S3_SECRET_KEY}
  S3Settings__CloudFrontUrl: ${MEDIA_S3_CLOUDFRONT_URL:-}

x-notification-service-environment: &notification-service-environment
  ConnectionStrings__notification-db: Host=postgres;Port=5432;Database=${NOTIFICATION_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
  ConnectionStrings__redis-cache: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672

x-ai-service-environment: &ai-service-environment
  ConnectionStrings__ai-db: Host=postgres;Port=5432;Database=${AI_SERVICE_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
  ConnectionStrings__redis-cache: redis:6379,password=${REDIS_PASSWORD}
  ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
  AiProvider: ${AI_PROVIDER:-Gemini}
  Gemini__ApiKey: ${GEMINI_API_KEY}
  Gemini__ApiEndpoint: ${GEMINI_API_ENDPOINT:-https://generativelanguage.googleapis.com/v1beta}
  Gemini__DefaultModel: ${GEMINI_DEFAULT_MODEL:-gemini-2.5-flash-lite}
  Gemini__MaxRetries: ${GEMINI_MAX_RETRIES:-3}
  Gemini__TimeoutSeconds: ${GEMINI_TIMEOUT_SECONDS:-180}
  Bedrock__Region: ${BEDROCK_REGION:-us-east-1}
  Bedrock__AccessKey: ${BEDROCK_ACCESS_KEY:-}
  Bedrock__SecretKey: ${BEDROCK_SECRET_KEY:-}
  Bedrock__DefaultModel: ${BEDROCK_DEFAULT_MODEL:-anthropic.claude-3-5-sonnet-20240620-v1:0}
  Bedrock__MaxRetries: ${BEDROCK_MAX_RETRIES:-3}
  Bedrock__TimeoutSeconds: ${BEDROCK_TIMEOUT_SECONDS:-60}
  VehicleService__BaseUrl: ${VEHICLE_SERVICE_BASE_URL:-http://vehicle-service:8080}

services:
  postgres:
    image: postgres:17-alpine
    container_name: verendar-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-verendar}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-verendar}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - verendar-network
    restart: unless-stopped

  redis:
    image: redis:7.4.0-alpine
    container_name: verendar-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - verendar-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.0.2-management-alpine
    container_name: verendar-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_NODENAME: rabbit@rabbitmq
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - verendar-network
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: verendar-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./data/gateway/etc/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - verendar-network
    restart: unless-stopped
    depends_on:
      identity-service:
        condition: service_started
      vehicle-service:
        condition: service_started
      media-service:
        condition: service_started
      notification-service:
        condition: service_started
      ai-service:
        condition: service_started

  identity-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-identity-service:${IMAGE_TAG:-latest}
    container_name: verendar-identity-service
    expose:
      - "8080"
    ports:
      - "${IDENTITY_SERVICE_PORT:-7001}:8080"
    environment:
      <<: [ *common-environment, *identity-service-environment ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - verendar-network
    restart: unless-stopped

  vehicle-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-vehicle-service:${IMAGE_TAG:-latest}
    container_name: verendar-vehicle-service
    expose:
      - "8080"
    ports:
      - "${VEHICLE_SERVICE_PORT:-7002}:8080"
    environment:
      <<: [ *common-environment, *vehicle-service-environment ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - verendar-network
    restart: unless-stopped

  media-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-media-service:${IMAGE_TAG:-latest}
    container_name: verendar-media-service
    expose:
      - "8080"
    ports:
      - "${MEDIA_SERVICE_PORT:-7003}:8080"
    environment:
      <<: [ *common-environment, *media-service-environment ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - verendar-network
    restart: unless-stopped

  notification-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-notification-service:${IMAGE_TAG:-latest}
    container_name: verendar-notification-service
    expose:
      - "8080"
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-7004}:8080"
    environment:
      <<: [ *common-environment, *notification-service-environment ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - verendar-network
    restart: unless-stopped

  ai-service:
    image: ${DOCKER_IMAGE_PREFIX}/verendar-ai-service:${IMAGE_TAG:-latest}
    container_name: verendar-ai-service
    expose:
      - "8080"
    ports:
      - "${AI_SERVICE_PORT:-7005}:8080"
    environment:
      <<: [ *common-environment, *ai-service-environment ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - verendar-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  verendar-network:
    driver: bridge
