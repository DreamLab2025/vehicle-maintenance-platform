map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream identity_service {
    server identity-service:8080;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}
upstream vehicle_service {
    server vehicle-service:8080;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}
upstream media_service {
    server media-service:8080;
    keepalive 16;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}
upstream notification_service {
    server notification-service:8080;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}
upstream ai_service {
    server ai-service:8080;
    keepalive 8;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

server {
    listen 80;
    server_name localhost;

    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    client_max_body_size 100M;
    client_body_buffer_size 128k;

    proxy_connect_timeout 90s;
    proxy_send_timeout 90s;
    proxy_read_timeout 90s;
    proxy_buffer_size 8k;
    proxy_buffers 16 32k;
    proxy_busy_buffers_size 64k;
    proxy_max_temp_file_size 1024m;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location ~ ^/api/v1/auth(/.*)?$ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://identity_service;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
    location ~ ^/api/v1/users(/.*)?$ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://identity_service;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
    location ~ ^/api/internal(/.*)?$ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://identity_service;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location ~ ^/api/v1/ai(/.*)?$ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://ai_service;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location ~ ^/api/v1/user-vehicles(/.*)?$ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://vehicle_service;
    }
    location ~ ^/api/v1/maintenance-records(/.*)?$ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://vehicle_service;
    }
    location ~ ^/api/v1/(variants|models|vehicle-models|odometer-history|parts|types|brands)(/.*)?$ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://vehicle_service;
    }

    location ~ ^/api/v1/media-files(/.*)?$ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://media_service;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location ~ ^/api/v1/notifications(/.*)?$ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://notification_service;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location /hubs/ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://notification_service;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location / {
        return 200 '{"service":"Verendar API Gateway","version":"1.0","status":"healthy"}';
        add_header Content-Type application/json;
    }
    error_page 404 /404.json;
    location = /404.json {
        internal;
        return 404 '{"error":"Not Found"}';
        add_header Content-Type application/json;
    }
    error_page 500 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        return 500 '{"error":"Internal Server Error"}';
        add_header Content-Type application/json;
    }
}
