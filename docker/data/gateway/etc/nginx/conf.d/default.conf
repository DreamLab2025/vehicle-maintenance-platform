map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream identity_service {
    server identity-service:8080;
    keepalive 32; 
}
upstream vehicle_service {
    server vehicle-service:8080;
     keepalive 32;
}
upstream media_service { 
    server media-service:8080; 
    keepalive 32; 
}
upstream notification_service { 
    server notification-service:8080; 
    keepalive 32; 
}
upstream ai_service {
    server ai-service:8080; 
    keepalive 32; 
}

limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=20r/m;

server {
    listen 80;
    server_name localhost;
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    proxy_connect_timeout 90s;
    proxy_send_timeout 90s;
    proxy_read_timeout 90s;
    access_log /var/log/nginx/verendar_access.log combined;
    error_log /var/log/nginx/verendar_error.log warn;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location ~ ^/api/v1/auth(/.*)?$ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://identity_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
    location ~ ^/api/v1/users(/.*)?$ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://identity_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
    location ~ ^/api/internal(/.*)?$ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://identity_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location ~ ^/api/v1/ai(/.*)?$ {
        limit_req zone=general burst=10 nodelay;
        proxy_pass http://ai_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location ~ ^/api/v1/user-vehicles(/.*)?$ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://vehicle_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/api/v1/maintenance-records(/.*)?$ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://vehicle_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/api/v1/(variants|models|vehicle-models|odometer-history|parts|types|brands)(/.*)?$ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://vehicle_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/media-files(/.*)?$ {
        limit_req zone=upload burst=10 nodelay;
        proxy_pass http://media_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location ~ ^/api/v1/notifications(/.*)?$ {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://notification_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location /hubs/ {
        proxy_pass http://notification_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location / {
        return 200 '{"service":"Verendar API Gateway","version":"1.0","status":"healthy"}';
        add_header Content-Type application/json;
    }
    error_page 404 /404.json;
    location = /404.json {
        internal;
        return 404 '{"error":"Not Found"}';
        add_header Content-Type application/json;
    }
    error_page 500 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        return 500 '{"error":"Internal Server Error"}';
        add_header Content-Type application/json;
    }
    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"error":"Too Many Requests"}';
        add_header Content-Type application/json;
    }
}
