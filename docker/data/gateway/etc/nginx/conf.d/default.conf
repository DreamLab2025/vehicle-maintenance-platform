# Verendar dev gateway - proxy to backend services
# Customize as needed (e.g. /api/identity -> identity-service:8080).
upstream identity { server identity-service:8080; }
upstream vehicle { server vehicle-service:8080; }
upstream media { server media-service:8080; }
upstream notification { server notification-service:8080; }
upstream ai { server ai-service:8080; }

server {
    listen 80;
    server_name localhost;

    location /api/identity/ {
        proxy_pass http://identity/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/vehicle/ {
        proxy_pass http://vehicle/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/media/ {
        proxy_pass http://media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/notification/ {
        proxy_pass http://notification/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ai/ {
        proxy_pass http://ai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 200 'Verendar gateway OK';
        add_header Content-Type text/plain;
    }
}
