services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: verendar
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d verendar"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  verendar.identity:
    build:
      context: .
      dockerfile: Identity/Verendar.Identity/Dockerfile
    env_file: .env.dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "7001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  verendar.vehicle:
    build:
      context: .
      dockerfile: Vehicle/Verendar.Vehicle/Dockerfile
    env_file: .env.dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "7002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  verendar.media:
    build:
      context: .
      dockerfile: Media/Verendar.Media/Dockerfile
    env_file: .env.dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "7003:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  verendar.notification:
    build:
      context: .
      dockerfile: Notification/Verendar.Notification/Dockerfile
    env_file: .env.dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "7004:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  verendar.ai:
    build:
      context: .
      dockerfile: Ai/Verendar.Ai/Dockerfile
    env_file: .env.dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "7005:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro