name: Docker Build & Push

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOTNET_VERSION: '9.0.x'

jobs:
  verify:
    name: Build solution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: dotnet build
        run: dotnet build Verendar.sln -c Release

  build-and-push:
    name: Push ${{ matrix.image }}
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: verendar-identity-service
            dockerfile: Identity/Verendar.Identity/Dockerfile
            cache_scope: identity
          - image: verendar-vehicle-service
            dockerfile: Vehicle/Verendar.Vehicle/Dockerfile
            cache_scope: vehicle
          - image: verendar-media-service
            dockerfile: Media/Verendar.Media/Dockerfile
            cache_scope: media
          - image: verendar-notification-service
            dockerfile: Notification/Verendar.Notification/Dockerfile
            cache_scope: notification
          - image: verendar-ai-service
            dockerfile: Ai/Verendar.Ai/Dockerfile
            cache_scope: ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest
