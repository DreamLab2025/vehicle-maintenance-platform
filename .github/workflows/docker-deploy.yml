name: Docker Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Identity
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Identity/Verendar.Identity/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/verendar-identity-service:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/verendar-identity-service:latest

      - name: Build and push Vehicle
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Vehicle/Verendar.Vehicle/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/verendar-vehicle-service:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/verendar-vehicle-service:latest

      - name: Build and push Media
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Media/Verendar.Media/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/verendar-media-service:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/verendar-media-service:latest

      - name: Build and push Notification
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Notification/Verendar.Notification/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/verendar-notification-service:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/verendar-notification-service:latest

      - name: Build and push Ai
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Ai/Verendar.Ai/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/verendar-ai-service:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/verendar-ai-service:latest
