name: Docker Build & Push

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: docker-build-push-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  DOTNET_VERSION: "9.0.x"

jobs:
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            global:
              - 'App/**'
              - 'Verendar.sln'
              - 'Directory.*.props'
              - 'Directory.*.targets'
              - 'global.json'
              - 'nuget.config'
              - '**/Verendar.*.Contracts/**'
              - '.github/workflows/docker-deploy.yml'
            identity:
              - 'Identity/**'
            vehicle:
              - 'Vehicle/**'
            media:
              - 'Media/**'
            notification:
              - 'Notification/**'
            ai:
              - 'Ai/**'
            location:
              - 'Location/**'
            garage:
              - 'Garage/**'

      - name: Build matrix
        id: matrix
        env:
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
          EVENT_NAME: ${{ github.event_name }}
          GLOBAL_CHANGED: ${{ steps.filter.outputs.global }}
          IDENTITY_CHANGED: ${{ steps.filter.outputs.identity }}
          VEHICLE_CHANGED: ${{ steps.filter.outputs.vehicle }}
          MEDIA_CHANGED: ${{ steps.filter.outputs.media }}
          NOTIFICATION_CHANGED: ${{ steps.filter.outputs.notification }}
          AI_CHANGED: ${{ steps.filter.outputs.ai }}
          LOCATION_CHANGED: ${{ steps.filter.outputs.location }}
          GARAGE_CHANGED: ${{ steps.filter.outputs.garage }}
        run: |
          set -euo pipefail

          build_all=false
          if [[ "$IS_TAG" == "true" || "$EVENT_NAME" == "workflow_dispatch" || "$GLOBAL_CHANGED" == "true" ]]; then
            build_all=true
          fi

          matrix='[]'

          add_image() {
            local changed="$1"
            local image="$2"
            local dockerfile="$3"
            local scope="$4"

            if [[ "$build_all" == "true" || "$changed" == "true" ]]; then
              matrix="$(jq \
                --arg image "$image" \
                --arg dockerfile "$dockerfile" \
                --arg scope "$scope" \
                '. + [{"image": $image, "dockerfile": $dockerfile, "cache_scope": $scope}]' \
                <<< "$matrix")"
            fi
          }

          add_image "$IDENTITY_CHANGED" "verendar-identity-service" "Identity/Verendar.Identity/Dockerfile" "identity"
          add_image "$VEHICLE_CHANGED" "verendar-vehicle-service" "Vehicle/Verendar.Vehicle/Dockerfile" "vehicle"
          add_image "$MEDIA_CHANGED" "verendar-media-service" "Media/Verendar.Media/Dockerfile" "media"
          add_image "$NOTIFICATION_CHANGED" "verendar-notification-service" "Notification/Verendar.Notification/Dockerfile" "notification"
          add_image "$AI_CHANGED" "verendar-ai-service" "Ai/Verendar.Ai/Dockerfile" "ai"
          add_image "$LOCATION_CHANGED" "verendar-location-service" "Location/Verendar.Location/Dockerfile" "location"
          add_image "$GARAGE_CHANGED" "verendar-garage-service" "Garage/Verendar.Garage/Dockerfile" "garage"

          count="$(jq 'length' <<< "$matrix")"
          has_changes=false
          if [[ "$count" -gt 0 ]]; then
            has_changes=true
          fi

          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":$(jq -c '.' <<< "$matrix")}" >> "$GITHUB_OUTPUT"

          echo "Selected $count image(s) for build."

  verify:
    name: Build solution
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json
            global.json

      - name: dotnet restore
        run: dotnet restore Verendar.sln --nologo

      - name: dotnet build
        run: dotnet build Verendar.sln -c Release --no-restore --nologo

  build-and-push:
    name: Push ${{ matrix.image }}
    needs: [changes, verify]
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tags
        id: tags
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}
        run: |
          set -euo pipefail

          tags=()
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tags+=("${DOCKER_IMAGE}:${GITHUB_REF#refs/tags/}")
          else
            tags+=("${DOCKER_IMAGE}:sha-${GITHUB_SHA:0:7}")
          fi

          tags+=("${DOCKER_IMAGE}:latest")

          {
            echo 'value<<EOF'
            printf '%s\n' "${tags[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          pull: true
          provenance: false
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          tags: ${{ steps.tags.outputs.value }}

  no-changes:
    name: Skip build
    needs: changes
    if: needs.changes.outputs.has_changes != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: No deployable changes
        run: echo "No deployable service changes detected. Skipping Docker builds."
